name: Tests

on:
  push:
    branches:
      - main
      - v2-public-readiness
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Compile sources
        run: python -m compileall -q src

      - name: Check CLI help
        run: |
          telegram-tools --help
          telegram-tools discover --help
          telegram-tools clear-messages --help
          telegram-tools search --help
          telegram-tools bot-inventory --help
          telegram-tools bot-add --help
          telegram-tools doctor --help

      - name: Check launcher syntax
        run: |
          for f in scripts/*.command; do bash -n "$f"; done
